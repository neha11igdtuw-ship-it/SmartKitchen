# Render Blueprint — https://render.com/docs/blueprint-spec
# After deploy: set MONGODB_URI (MongoDB Atlas) and JWT_SECRET in the dashboard if not prompted.

services:
  - type: web
    name: smartkitchen
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
